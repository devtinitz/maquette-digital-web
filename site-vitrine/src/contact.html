<!DOCTYPE html>
<html lang="fr" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Modern | Tinitz</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { navy: { 800: '#002D5A' }, emerald: { 500: '#10B981' }, slate: { 950: '#020617' } } } }
        }
    </script>
    <link rel="stylesheet" href="../style/app.css">
</head>
<body class="antialiased">
    <div class="mesh-gradient"></div>

    <nav class="floating-nav">
        <a href="../index.html" class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-navy-800 rounded-xl flex items-center justify-center border border-white/10"><i data-lucide="zap" class="w-6 h-6 text-emerald-500"></i></div>
            <span class="text-2xl font-['Outfit'] font-black tracking-tighter text-white">TINITZ</span>
        </a>
        <div class="flex items-center space-x-6">
            <a href="tarifs.html" class="btn-glow-navy text-xs uppercase px-6">Back to Plans</a>
            <a href="contact.html" class="btn-glow-emerald text-xs uppercase px-6">Start Trial</a>
        </div>
    </nav>

    <main class="pt-48 pb-20 px-6">
        <div class="container mx-auto">
            <div class="flex flex-col lg:flex-row gap-24 items-center">
                <div class="lg:w-2/5 vivant-reveal">
                    <h1 class="text-7xl md:text-9xl mb-8 leading-none">Let's <br> <span class="text-emerald-500">Connect.</span></h1>
                    <p class="text-slate-400 text-xl font-light mb-16">Besoin d'un architecte d'expérience ? Notre équipe d'élite répond sous 4 heures pour transformer votre vision.</p>
                    <div class="space-y-8">
                        <div class="flex items-center space-x-6">
                            <div class="w-14 h-14 bento-card p-0 flex items-center justify-center text-emerald-500"><i data-lucide="mail"></i></div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-slate-500">Expert Support</p>
                                <p class="text-xl font-black">elite@tinitz.tech</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:w-3/5 w-full vivant-reveal">
                    <div class="bento-card p-12 bg-white/[0.01]">
                        <form class="space-y-10">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div class="space-y-3">
                                    <label class="text-[10px] uppercase tracking-widest font-black text-slate-500">Nom Complet</label>
                                    <input type="text" class="w-full bg-transparent border-b border-white/10 p-4 focus:border-emerald-500 transition-all focus:outline-none placeholder:opacity-20" placeholder="Jean Dupont">
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] uppercase tracking-widest font-black text-slate-500">Email Pro</label>
                                    <input type="email" class="w-full bg-transparent border-b border-white/10 p-4 focus:border-emerald-500 transition-all focus:outline-none placeholder:opacity-20" placeholder="jean@enterprise.com">
                                </div>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest font-black text-slate-500">Votre Vision</label>
                                <textarea rows="3" class="w-full bg-transparent border-b border-white/10 p-4 focus:border-emerald-500 transition-all focus:outline-none placeholder:opacity-20" placeholder="Décrivez votre projet événementiel..."></textarea>
                            </div>
                            <button class="btn-glow-emerald w-full uppercase tracking-[0.4em] font-black italic">Envoyer la vision</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-white/5 text-center text-[10px] font-black uppercase tracking-[0.5em] opacity-20">
        TINITZ HIGH-TECH GLOBAL &copy; 2026
    </footer>

    <script src="../style/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
