<!DOCTYPE html>
<html lang="fr" class="dark scroll-smooth">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { navy: { 800: '#002D5A' }, emerald: { 500: '#10B981' }, slate: { 950: '#020617' } } } }
        }
    </script>
    <link rel="stylesheet" href="../style/app.css">
</head>
<body class="antialiased">
    <div class="mesh-gradient"></div>

    <nav class="floating-nav">
        <a href="../index.html" class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-navy-800 rounded-xl flex items-center justify-center border border-white/10"><i data-lucide="zap" class="w-6 h-6 text-emerald-500"></i></div>
            <span class="text-2xl font-['Outfit'] font-black tracking-tighter text-white">TINITZ</span>
        </a>
        <div class="hidden md:flex items-center space-x-12 text-sm font-semibold uppercase tracking-widest">

    </nav>

    <main class="pt-48 pb-32 px-6">
        <div class="container mx-auto">
            <h1 class="text-7xl md:text-9xl mb-20 vivant-reveal">Realised <br> <span class="stat-accent">Impact.</span></h1>
            
            <div class="bento-master">
                <!-- Project 1 (Wide) -->
                <div class="bento-card col-span-12 md:col-span-8 group overflow-hidden vivant-reveal">
                    <div class="flex flex-col md:flex-row h-full">
                        <div class="md:w-1/2 p-12 flex flex-col justify-center">
                            <span class="badge-alert mb-4 inline-block">Case Study</span>
                            <h2 class="text-3xl mb-4 italic">TechXperience 2026</h2>

                        <div class="md:w-1/2 bg-navy-900/60 p-8 flex items-center justify-center overflow-hidden">

                    </div>
                </div>

                <!-- Project 2 (Standard) -->
                <div class="bento-card col-span-12 md:col-span-4 p-12 vivant-reveal flex flex-col items-center justify-center text-center">

                </div>

    <script src="../style/main.js"></script>
    <script>lucide.createIcons();</script>
